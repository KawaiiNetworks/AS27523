name: Update bgpq4 Cache

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bgpq4:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      - name: Checkout scripts repo
        uses: actions/checkout@v4
        with:
          repository: kawaiinetworks/as27523-vyos-scripts
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bgpq4
          pip install pyyaml requests aggregate-prefixes

      - name: Update bgpq4 cache
        run: python scripts/configure/save-cache.py . --bgpq4-only

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update bgpq4 cache [automated]"
            git push
          fi
