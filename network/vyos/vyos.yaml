# ============================================================================
# Migrated from the FRR schema to BIRD. Key conversions:
#  - template.as-path-list (regex)  -> per-router defines.as-sets (integer sets);
#    `_asn_` (contains) matched with path_contains_asn_set(...), `asn$` (origin)
#    matched with `bgp_path.last ~ ...`.
#  - pre-import/export-accept route-maps -> raw BIRD filter code. `permit+set`
#    with on-match next = modifier (set, fall through to accept); `deny` = reject;
#    `permit ... on-match-next:false` = accept (stop). NOTE: these hooks now run
#    at the END of the import/export filter (after the base cone/out filter).
#  - redistribute.pre-accept -> protocols.direct.pre-import-accept.
#  - kernel.ipv4/ipv6 (src)  -> protocols.kernel.*.pre-export-accept (krt_prefsrc).
#  - update-source: <iface>  -> dropped (directly-connected; BIRD auto-sources).
#    update-source: <IP>      -> source-address: <IP>.
#  - unnumbered neighbor-address: <iface> -> "fe80::1%<iface>" PLACEHOLDER link-
#    local (search FIXME and replace with the real peer link-local).
#  - soft-reconfiguration-inbound -> dropped (BIRD is always soft).
# ============================================================================

# Shared, repeated definitions live here and are pulled into the routers below
# via YAML anchors (*name). The generator ignores the `template` key itself.
template:
  as-sets:
    # PassGFW: routes ORIGINATED by these ASNs bypass the GFW upstream filter
    # (matched with `bgp_path.last ~ ...`, i.e. origin, not transit).
    passgfw: &passgfw
      - 15133 # Edgecast
      - 54113 # Fastly
      - 20940 # Akamai
      - 3462 # HiNet
      - 15169 # Google
      - 16550
      - 16591
      - 19527
      - 36040
      - 43515
      - 139070
      - 139190
      - 396982
      - 62014 # Telegram
      - 62041
      - 59930
      - 13414 # Twitter
      - 35995
      - 63179
      - 13335 # Cloudflare
      - 4694 # IDC Frontier
      - 14618 # Amazon
      - 16509
      - 14907 # Wikimedia
      - 32934 # Meta
      - 54115
      - 63293
  filters:
    # only import routes originated by a PassGFW ASN (GFW bypass).
    gfw-import: &gfw_import |
      if !(bgp_path.last ~ autogen_as_passgfw) then reject;

